name: Android CI - Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # === FIX UTAMA: Inject debug signing password untuk bypass universal signing error ===
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          ORG_GRADLE_PROJECT_android_injected_signing_store_password: android
          ORG_GRADLE_PROJECT_android_injected_signing_key_password: android

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoNotTryAccessibility-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
